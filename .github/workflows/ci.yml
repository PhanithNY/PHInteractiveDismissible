name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Test Swift package
        run: xcodebuild test -scheme PHInteractiveDismissible -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest'
